name: deploy-pages

# Builds the storybook workspace and publishes it to GitHub Pages
# (mosaic-media.github.io/web). Requires the web repo's Pages source to be set to
# "GitHub Actions" (Settings → Pages). Runs only when the storybook or the
# runtime it renders changes.
on:
  push:
    branches: [main]
    paths:
      - "packages/storybook/**"
      - "packages/sdui-react/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build --workspace mosaic-storybook
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/storybook/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
