name: release

# Publishes @mosaic-media/sdui-react to npm on a version tag (e.g. v0.1.0).
# Requires an NPM_TOKEN repository (or org) secret — an npm automation token for
# the @mosaic-media scope.
on:
  push:
    tags: ["v*"]

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Guard — package.json version matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then echo "tag v$tag != package.json $pkg" >&2; exit 1; fi
      - run: npm install
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
